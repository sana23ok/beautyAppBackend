[pytest]
# Django (pytest-django reads this unless --ds overrides)
DJANGO_SETTINGS_MODULE = beauty_app_backend.settings

# Default pytest only discovers test_*.py / *_test.py; Django uses tests.py per app.
python_files = tests.py test_*.py *_test.py

# Default pytest only collects class names starting with Test; Django style is *Tests (e.g. BoundsFromHoursTests).
python_classes =
    Test*
    *Tests

python_functions = test_*

# Only app-level unit tests (faster discovery)
testpaths =
    bookings
    appearance_test
    users
    masters
    chat

# Fewer traceback noise for asserts
addopts =
    --strict-markers
